<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Garuda Indonesia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container-fluid py-4">
    <div class="row">
      <!-- Sidebar -->
      <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-white sidebar shadow">
        <div class="position-sticky pt-3">
          <h4 class="text-center mb-4 text-garuda-blue">
            <i class="fas fa-plane me-2"></i>Admin Garuda
          </h4>
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link active" href="#" onclick="showSection('dashboard')"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="showSection('tickets')"><i class="fas fa-ticket-alt me-2"></i>Kelola Tickets</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="showSection('berita')"><i class="fas fa-newspaper me-2"></i>Kelola Berita</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <div class="d-flex justify-content-between align-items-center pt-3 pb-3 mb-3 border-bottom">
          <h1 class="h2" id="pageTitle">Dashboard</h1>
        </div>

        <!-- Dashboard Stats -->
        <div id="dashboard" class="row mb-4">
          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-start-garuda-blue shadow h-100 py-2">
              <div class="card-body">
                <div class="row align-items-center">
                  <div class="col">
                    <div class="text-xs font-weight-bold text-garuda-blue text-uppercase mb-1">Total Tickets</div>
                    <div class="h5 mb-0 font-weight-bold" id="totalTickets">0</div>
                  </div>
                  <div class="col-auto"><i class="fas fa-ticket-alt fa-2x opacity-50"></i></div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-start-warning shadow h-100 py-2">
              <div class="card-body">
                <div class="row align-items-center">
                  <div class="col">
                    <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">Pending</div>
                    <div class="h5 mb-0 font-weight-bold" id="pendingTickets">0</div>
                  </div>
                  <div class="col-auto"><i class="fas fa-clock fa-2x opacity-50"></i></div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-start-garuda-orange shadow h-100 py-2">
              <div class="card-body">
                <div class="row align-items-center">
                  <div class="col">
                    <div class="text-xs font-weight-bold text-garuda-orange text-uppercase mb-1">Total Berita</div>
                    <div class="h5 mb-0 font-weight-bold" id="totalBerita">0</div>
                  </div>
                  <div class="col-auto"><i class="fas fa-newspaper fa-2x opacity-50"></i></div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6 mb-4">
            <div class="card border-start-success shadow h-100 py-2">
              <div class="card-body">
                <div class="row align-items-center">
                  <div class="col">
                    <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Selesai Hari Ini</div>
                    <div class="h5 mb-0 font-weight-bold">15</div>
                  </div>
                  <div class="col-auto"><i class="fas fa-check-circle fa-2x opacity-50"></i></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Tickets Management -->
        <div id="tickets" class="card mb-4 shadow" style="display:none;">
          <div class="card-header py-3 bg-garuda-blue text-white">
            <h6 class="m-0 font-weight-bold">Kelola Tickets Penumpang</h6>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead>
                  <tr><th>ID</th><th>Penumpang</th><th>HP</th><th>Masalah</th><th>Status</th><th>Tanggal</th><th>Action</th></tr>
                </thead>
                <tbody id="ticketTable"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Berita Management -->
        <div id="berita" class="card mb-4 shadow" style="display:none;">
          <div class="card-header py-3 d-flex justify-content-between bg-garuda-orange text-dark">
            <h6 class="m-0 font-weight-bold">Kelola Berita & Pengumuman</h6>
            <button class="btn btn-dark btn-sm" onclick="toggleBeritaForm()">
              <i class="fas fa-plus me-1"></i>Tambah Berita
            </button>
          </div>
          <div class="card-body">
            <form id="addBeritaForm" style="display:none;" class="mb-4 p-3 border rounded">
              <div class="row g-3">
                <div class="col-md-6">
                  <input type="text" class="form-control" name="title" placeholder="Judul Berita" required>
                </div>
                <div class="col-md-6">
                  <input type="date" class="form-control" name="date" required>
                </div>
                <div class="col-12">
                  <textarea class="form-control" name="excerpt" rows="2" placeholder="Excerpt singkat" required></textarea>
                </div>
                <div class="col-md-8">
                  <input type="url" class="form-control" name="img" placeholder="Image URL (optional)">
                </div>
                <div class="col-md-4">
                  <button type="submit" class="btn btn-success w-100">Simpan Berita</button>
                </div>
              </div>
            </form>
            <div class="table-responsive">
              <table class="table table-hover">
                <thead><tr><th>Judul</th><th>Tanggal</th><th>Action</th></tr></thead>
                <tbody id="beritaTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    // Form handlers
    document.getElementById('addBeritaForm').addEventListener('submit', (e) => {
      e.preventDefault();
      addBerita(e.target);
    });
  </script>
</body>
</html>
